services:
  xinference:
    image: xprobe/xinference:latest
    container_name: ruige-xinference
    restart: unless-stopped
    ports:
      - "127.0.0.1:9997:9997"
    volumes:
      - xinference_data:/root/.xinference
    command: ["xinference", "local", "--host", "0.0.0.0", "--port", "9997"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  xinference_data:
