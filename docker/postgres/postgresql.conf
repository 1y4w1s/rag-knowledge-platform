# 睿阁 PostgreSQL 配置（2G 云机器优化版）
# 基于 postgres:16-bookworm 默认值调优

# ── 内存 ────────────────────────────────────────────
shared_buffers = 256MB          # RAM 2G → 256MB（容器 768MB 的 ~33%）
effective_cache_size = 1GB      # OS page cache 估算
work_mem = 8MB                  # 排序/哈希操作（向量+FTS 需要）
maintenance_work_mem = 64MB     # VACUUM / CREATE INDEX
wal_buffers = 1MB

# ── 连接 ────────────────────────────────────────────
max_connections = 20            # API 池 10 + overflow 20 的上限

# ── 查询规划器 ───────────────────────────────────────
random_page_cost = 1.1          # SSD 存储
effective_io_concurrency = 200  # SSD 并行 IO

# ── 并行 ────────────────────────────────────────────
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
parallel_tuple_cost = 0.1
parallel_setup_cost = 100

# ── 日志 ────────────────────────────────────────────
log_min_duration_statement = 1000  # 慢查询日志（超过 1s 的记录）
log_checkpoints = on
log_lock_waits = on

# ── 自动清理 ─────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 2       # 2G 机器不宜过多
autovacuum_naptime = 1min
autovacuum_vacuum_scale_factor = 0.01
autovacuum_analyze_scale_factor = 0.005
