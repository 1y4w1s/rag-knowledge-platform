# 睿阁 — nginx HTTPS 配置（自签证书）
# 由 scripts/gen-certs.ps1 生成证书后启用。
#
# 使用方式：
#   1. .\scripts\gen-certs.ps1
#   2. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   3. 访问 https://localhost

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/ruige.crt;
    ssl_certificate_key /etc/nginx/certs/ruige.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # HTTP → HTTPS 重定向（可选）
    # 取消下方注释以强制 HTTPS
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
