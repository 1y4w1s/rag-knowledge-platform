name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sa-ac-gate:
    name: W6-2 SA-1~3 gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhiku
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: zhiku
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zhiku -d zhiku"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://zhiku:changeme@localhost:5432/zhiku
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      EMBEDDING_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Alembic upgrade head
        run: python -m alembic upgrade head

      - name: SA-1~3 acceptance (PRD §10)
        run: pytest tests/test_security_ac.py tests/test_upload_security.py -v --tb=short

  rag-golden-hit-at-3:
    name: R5-2 golden Hit@3 gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhiku
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: zhiku
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zhiku -d zhiku"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://zhiku:changeme@localhost:5432/zhiku
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      EMBEDDING_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Alembic upgrade head
        run: python -m alembic upgrade head

      - name: golden Hit@3 (GQ-1～12 · mock embed)
        run: pytest tests/test_retrieval_golden.py -v --tb=short

  org-isolation-matrix:
    name: ORG-1.9 isolation matrix gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhiku
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: zhiku
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zhiku -d zhiku"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://zhiku:changeme@localhost:5432/zhiku
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      EMBEDDING_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Alembic upgrade head
        run: python -m alembic upgrade head

      - name: ORG isolation matrix (test_org_isolation.py)
        run: pytest tests/test_org_isolation.py -v --tb=short

  backend:
    name: backend pytest
    needs: [sa-ac-gate, rag-golden-hit-at-3, org-isolation-matrix]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhiku
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: zhiku
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zhiku -d zhiku"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://zhiku:changeme@localhost:5432/zhiku
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      EMBEDDING_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Alembic upgrade head
        run: python -m alembic upgrade head

      - name: pytest
        run: pytest -v

  frontend:
    name: frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm run build
        run: npm run build
