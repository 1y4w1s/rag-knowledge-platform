name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://ruige:changeme@localhost:5432/ruige
      JWT_SECRET: 1362b8353e8306574369454872b0fb2a

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ruige
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: ruige
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ruige"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install 'pytest>=8.3,<9' 'pytest-asyncio>=0.24,<0.25' httpx python-docx openpyxl python-pptx reportlab python-jose resend ruff pytest-mock

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github
        continue-on-error: true

      - name: Apply migrations
        run: |
          alembic upgrade head

      - name: Test migration rollback
        run: |
          alembic downgrade -1 && alembic upgrade head

      - name: Run core tests
        run: |
          python -m pytest tests/test_smoke.py tests/test_auth.py tests/test_workspace_scope.py tests/test_citations.py tests/test_search_documents.py tests/test_search_content.py tests/test_generation.py tests/test_knowledge_bases.py tests/test_document_list_pagination.py tests/test_knowledge_base_list_pagination.py tests/test_db_disconnect.py tests/test_upload_security.py tests/test_document_visibility.py tests/test_retrieval_security.py tests/test_preview.py tests/test_upload_failure.py tests/test_embedding_5xx.py tests/test_llm_5xx.py tests/test_m1_smoke.py tests/test_rag_relevance.py -v --tb=short

      - name: Run RAG + ingestion tests
        run: |
          python -m pytest tests/test_retrieval_golden.py tests/test_retrieval_hybrid.py tests/test_rerank.py tests/test_chunker.py tests/test_ingestion_golden.py tests/test_pptx_ingestion.py tests/test_xlsx_ingestion.py -v --tb=short

      - name: Run chat + streaming tests
        run: |
          python -m pytest tests/test_chat.py tests/test_r4_4_streaming.py tests/test_citation_resolve.py -v --tb=short
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/ --output-format=github
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check frontend builds
        working-directory: frontend
        run: |
          npm ci
          npm run build
