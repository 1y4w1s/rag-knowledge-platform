name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: zhiku
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: zhiku
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U zhiku
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx docx reportlab python-jose resend

      - name: Apply migrations
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://zhiku:changeme@localhost:5432/zhiku

      - name: Run unit tests
        run: |
          python -m pytest tests/test_generation.py tests/test_agent_tools.py -v --tb=short

      - name: Run golden QA (mock embedding)
        run: |
          python -m pytest tests/test_retrieval_golden.py -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://zhiku:changeme@localhost:5432/zhiku
