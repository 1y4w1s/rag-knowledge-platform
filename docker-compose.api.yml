# 睿阁 — 仅 API 容器（数据库用 Supabase 等外部 Postgres 时）
# 用法：.env 里 DATABASE_URL 指向 Supabase 后 → docker compose -f docker-compose.api.yml up -d --build

services:
  api:
    build:
      context: ./backend
    container_name: zhiku-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    mem_limit: 2g
