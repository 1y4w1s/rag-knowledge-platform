# 睿阁 — 监控栈（Grafana + Loki）
# 用法：docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# 验收：http://localhost:3000  →  Grafana（admin/admin）
#       http://localhost:3100/ready  →  Loki ready

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: ruige-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ruige-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards-definitions:/var/lib/grafana/dashboards:ro
      - ./docker/grafana/alerting:/etc/grafana/provisioning/alerting:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.4.1
    container_name: ruige-tempo
    restart: unless-stopped
    ports:
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:3200:3200"   # Tempo UI (Grafana datasource)
    volumes:
      - ./docker/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  loki_data:
  grafana_data:
  tempo_data:
