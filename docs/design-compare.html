<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>知岸 · 视觉升级对比预览</title>
<style>
  /* ============ 设计令牌（与 index.css :root 一致） ============ */
  :root {
    --bg: #fafaf8;
    --surf: #ffffff;
    --text: #18181b;
    --mut: #71717a;
    --mut-warm: #52525b;
    --line: #efeae4;
    --line2: #e8e4df;
    --pri: #18181b;
    --action: #cb6b3d;
    --action-hover: #b85a2e;
    --action-bg: #fbeede;
    --nav-active-bg: #fff1ea;
    --nav-active-text: #cb6b3d;
    --ubg: #f5f2ed;
    --surface-2: #f7f4f0;
    --acc-bg: #efebe6;
    --brand-grad: linear-gradient(135deg, #e8824e 0%, #cf6a3a 52%, #b14e26 100%);
    --brand-grad-deep: linear-gradient(135deg, #a8451e 0%, #6f2710 100%);
    --glow-a: radial-gradient(60% 50% at 16% 6%, rgba(232,130,78,0.22) 0%, rgba(232,130,78,0) 70%);
    --glow-b: radial-gradient(55% 45% at 90% 10%, rgba(196,140,96,0.16) 0%, rgba(196,140,96,0) 72%);
    --glow-c: radial-gradient(50% 40% at 72% 96%, rgba(203,107,61,0.12) 0%, rgba(203,107,61,0) 70%);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.06);
    --shadow-xl: 0 1px 2px rgba(203,107,61,0.06), 0 10px 28px rgba(140,80,50,0.12), 0 28px 64px rgba(120,70,45,0.16);
    --r: 12px;
    --sidebar: 232px;
    --serif: "Noto Serif SC", "Songti SC", "SimSun", "STSong", serif;
    --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    /* v8 缓动 */
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --rv-dur: 0.7s;
    --pos: 50%;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--text);
    background: #2b2622;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ 顶部控制条 ============ */
  .topbar-ctrl {
    position: sticky; top: 0; z-index: 60;
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px;
    background: rgba(28,24,21,0.92);
    backdrop-filter: blur(10px);
    color: #f3ece6;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
  }
  .topbar-ctrl .brand {
    font-family: var(--serif);
    font-weight: 600; font-size: 15px; letter-spacing: 0.02em;
    color: #fff;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-ctrl .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--brand-grad);
    box-shadow: 0 0 0 4px rgba(203,107,61,0.18);
  }
  .topbar-ctrl .spacer { flex: 1; }
  .seg {
    display: inline-flex; gap: 3px; padding: 3px;
    background: rgba(255,255,255,0.08); border-radius: 999px;
  }
  .seg button {
    border: 0; cursor: pointer; font-family: inherit; font-size: 12.5px;
    color: #cdbfb6; background: transparent;
    padding: 7px 14px; border-radius: 999px; transition: all .18s ease;
  }
  .seg button.on { background: var(--action); color: #fff; font-weight: 600; }
  .seg button:hover:not(.on) { color: #fff; }

  .toggle-pills { display: none; gap: 8px; align-items: center; }
  .toggle-pills.show { display: inline-flex; }
  .pill {
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.06);
    color: #e9ddd4; cursor: pointer; font-family: inherit; font-size: 12.5px;
    padding: 7px 16px; border-radius: 999px; transition: all .18s ease;
  }
  .pill.active { background: rgba(203,107,61,0.9); border-color: var(--action); color: #fff; font-weight: 600; }
  .hint { font-size: 11.5px; color: #9b8e85; }

  /* ============ 对比舞台 ============ */
  .compare-stage {
    position: relative;
    height: calc(100vh - 54px);
    overflow: auto;
    background:
      radial-gradient(ellipse 100% 55% at 50% 0%, rgba(245,240,235,0.65) 0%, transparent 68%),
      var(--bg);
  }
  .layer {
    width: 100%;
  }
  .layer-old { position: relative; }        /* 决定滚动高度 */
  .layer-new {
    position: absolute; top: 0; left: 0; right: 0;
    clip-path: inset(0 0 0 var(--pos));
    transition: clip-path .35s var(--ease-out);
  }
  body.dragging .layer-new { transition: none; }

  /* 角标 */
  .corner-badge {
    position: fixed; top: 66px; z-index: 40;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    padding: 5px 11px; border-radius: 999px;
    pointer-events: none;
    box-shadow: var(--shadow-md);
  }
  .corner-badge.left { left: 16px; background: #fff; color: var(--action); border: 1px solid rgba(203,107,61,0.3); }
  .corner-badge.right { right: 16px; background: var(--pri); color: #fff; opacity: .82; }

  /* 竖条手柄 */
  .divider {
    position: absolute; top: 0; bottom: 0;
    left: var(--pos); width: 2px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
    z-index: 50; cursor: ew-resize;
    transform: translateX(-1px);
  }
  .divider .grip {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px; border-radius: 999px;
    background: #fff; color: var(--action);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    font-size: 13px; font-weight: 700; letter-spacing: -1px;
    cursor: ew-resize;
    border: 1px solid rgba(203,107,61,0.25);
  }
  .divider:focus-visible { outline: 2px solid var(--action); outline-offset: 2px; }
  body.mode-toggle .divider { display: none; }
  body.mode-toggle .corner-badge { display: none; }

  /* ============ App Shell ============ */
  .app-shell { display: flex; min-height: 100%; }
  .sidebar {
    width: var(--sidebar); flex: none;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(20px) saturate(140%);
    border-right: 1px solid var(--line);
    padding: 18px 14px;
    display: flex; flex-direction: column;
  }
  .ws-switcher {
    margin: 0 0 16px; padding: 8px 10px; border-radius: 10px;
    background: #f5ede8; display: flex; align-items: center; gap: 8px;
    font-size: 12.5px; font-weight: 600; color: var(--mut-warm);
  }
  .ws-switcher .av { width: 26px; height: 26px; border-radius: 8px; background: var(--brand-grad); color: #fff;
    display: grid; place-items: center; font-size: 12px; }
  .ws-switcher .chev { margin-left: auto; color: var(--mut); }
  .wordmark { font-family: var(--serif); font-weight: 600; font-size: 15px; letter-spacing: .02em; padding: 4px 8px 14px; }
  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 11px; border-radius: 10px;
    font-size: 13.5px; color: var(--mut-warm); text-decoration: none;
    transition: background .15s ease, color .15s ease;
  }
  .nav a .ico { width: 17px; height: 17px; opacity: .8; }
  .nav a:hover { background: var(--nav-on, #f5f2ed); color: var(--text); }
  .nav a.active {
    background: var(--nav-active-grad, linear-gradient(135deg, rgba(232,130,78,0.22), rgba(177,78,38,0.12)));
    color: var(--nav-active-text); font-weight: 600;
    border: 1px solid rgba(203,107,61,0.16);
  }
  .sidebar .foot { margin-top: auto; padding: 8px; font-size: 11.5px; color: var(--mut); border-top: 1px solid var(--line); }

  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 26px; border-bottom: 1px solid var(--line2);
    background: rgba(255,255,255,0.55); backdrop-filter: blur(8px);
  }
  .crumb { font-size: 13px; color: var(--mut); }
  .crumb b { color: var(--text); font-family: var(--serif); font-weight: 600; }
  .topbar .search {
    margin-left: 18px; flex: 1; max-width: 360px;
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; border-radius: 10px;
    border: 1px solid var(--line2); background: #fff; color: var(--mut); font-size: 12.5px;
  }
  .topbar .avatar {
    margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
    background: var(--brand-grad); color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 600;
  }

  .content { padding: 26px; max-width: 1080px; width: 100%; }
  .kicker { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600; letter-spacing: .08em;
    background-image: var(--brand-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .kicker::before { content: ""; width: 14px; height: 2px; border-radius: 2px; background-image: var(--brand-grad); }

  /* ============ Hero 卡 ============ */
  .hero {
    position: relative; overflow: hidden;
    border-radius: 18px; padding: 26px 28px; color: #fff;
    background-image: var(--brand-grad-deep);
    box-shadow: var(--shadow-xl);
  }
  .hero .static-glow {
    position: absolute; inset: 0; opacity: .5; pointer-events: none;
    background-image: linear-gradient(90deg, rgba(60,22,8,0.58) 0%, rgba(60,22,8,0.22) 45%, transparent 70%);
  }
  /* v8 旧版：静态径向高光（无呼吸） */
  .hero .static-radial {
    position: absolute; inset: 0; opacity: .4; pointer-events: none;
    background-image: radial-gradient(130% 130% at 100% 0%, rgba(255,255,255,0.4), rgba(255,255,255,0) 55%);
  }
  /* v8 新版：缓慢呼吸光晕 */
  .hero .hero-aurora {
    position: absolute; inset: -25%; z-index: 0; pointer-events: none;
    background-image: var(--glow-a), var(--glow-b), var(--glow-c);
    background-size: 180% 180%, 180% 180%, 180% 180%;
    background-repeat: no-repeat; opacity: .85; filter: saturate(1.05);
    animation: aurora-drift 20s ease-in-out infinite;
  }
  @keyframes aurora-drift {
    0%   { background-position: 0% 0%, 100% 0%, 50% 100%; }
    50%  { background-position: 28% 18%, 72% 30%, 42% 78%; }
    100% { background-position: 0% 0%, 100% 0%, 50% 100%; }
  }
  .is-old .hero-aurora { display: none; }
  .is-new .hero .static-radial,
  .is-new .hero .static-glow { display: none; }
  .is-old .hero .static-radial { display: block; }
  .is-old .hero .static-glow { display: block; }

  .hero-inner { position: relative; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .hero h1 { font-family: var(--serif); font-size: 22px; font-weight: 600; margin: 6px 0 6px; letter-spacing: .02em; }
  .hero p { margin: 0; color: rgba(255,255,255,0.82); font-size: 13px; max-width: 460px; line-height: 1.6; }
  .hero-cta-row { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
  .cta-primary {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 600;
    background-image: var(--brand-grad); color: #fff; text-decoration: none;
    box-shadow: 0 6px 18px rgba(203,107,61,0.35);
  }
  /* v8 新版：按钮扫光 */
  .btn-shine { position: relative; overflow: hidden; isolation: isolate; }
  .btn-shine::after {
    content: ""; position: absolute; top: 0; bottom: 0; left: 0; width: 45%;
    background: linear-gradient(100deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.42) 50%, rgba(255,255,255,0) 100%);
    transform: translateX(-130%) skewX(-18deg); transition: transform .7s var(--ease-out); pointer-events: none;
  }
  .btn-shine:hover::after, .btn-shine:focus-visible::after { transform: translateX(230%) skewX(-18deg); }
  .is-old .btn-shine::after { display: none; }
  .cta-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px; border-radius: 10px; font-size: 13px;
    background: rgba(255,255,255,0.15); color: #fff; text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .cta-ghost:hover { background: rgba(255,255,255,0.25); }

  .hero-kpis { display: flex; gap: 30px; }
  .hero-kpis .k { text-align: right; }
  .hero-kpis .v { font-family: var(--sans); font-size: 26px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .hero-kpis .l { margin-top: 5px; font-size: 11.5px; color: rgba(255,255,255,0.75); }

  /* ============ Stat 网格 ============ */
  .stats-grid { margin-top: 18px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .stat-card {
    position: relative; display: flex; flex-direction: column; min-height: 96px;
    border-radius: 12px; border: 1px solid var(--line2);
    background: rgba(255,255,255,0.85); padding: 14px 15px; box-shadow: var(--shadow-sm);
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-xl); border-color: rgba(203,107,61,0.28); }
  .stat-card .top-accent { position: absolute; top: 0; left: 16px; right: 16px; height: 2px; border-radius: 2px; background-image: var(--brand-grad-soft, linear-gradient(135deg, rgba(232,130,78,0.18), rgba(177,78,38,0.1))); }
  .stat-card .row { display: flex; align-items: center; gap: 11px; flex: 1; }
  .stat-card .ic { width: 36px; height: 36px; flex: none; border-radius: 10px; display: grid; place-items: center; }
  .stat-card .nm { font-size: 13px; font-weight: 600; color: var(--text); }
  .stat-card .vl { font-family: var(--sans); font-size: 21px; font-weight: 600; line-height: 1; letter-spacing: .04em; font-variant-numeric: tabular-nums; margin-bottom: 6px; }
  .stat-card .hl { font-size: 11px; color: var(--mut); margin-top: 2px; }
  .tone-clay { background: #FFF1EA; color: #B86A3D; }
  .tone-blue { background: #EDF4FF; color: #3B6FCF; }
  .tone-green { background: #F0F9F3; color: #3D8F63; }
  .tone-rose { background: #FDF2F4; color: #C95B6E; }

  /* ============ Section 卡片 ============ */
  .section { margin-top: 22px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-head h2 { font-family: var(--serif); font-size: 16px; font-weight: 600; margin: 0; letter-spacing: .02em; }
  .section-head a { font-size: 12px; color: var(--action); text-decoration: none; }
  .panel { border-radius: 14px; border: 1px solid var(--line2); background: rgba(255,255,255,0.85); box-shadow: var(--shadow-sm); overflow: hidden; }
  .kb-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--line); }
  .kb-row:last-child { border-bottom: 0; }
  .kb-row .thumb { width: 34px; height: 34px; border-radius: 9px; background: var(--surface-2); display: grid; place-items: center; color: var(--mut); font-size: 15px; }
  .kb-row .meta { flex: 1; min-width: 0; }
  .kb-row .t { font-size: 13.5px; font-weight: 600; color: var(--text); }
  .kb-row .s { font-size: 11.5px; color: var(--mut); margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .badge-ok { background: rgba(91,168,110,0.16); color: #27693d; }
  .badge-wait { background: rgba(232,148,58,0.16); color: #9a5a12; }

  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .metric-card { padding: 16px; border-radius: 12px; border: 1px solid var(--line2); background: rgba(255,255,255,0.85); box-shadow: var(--shadow-sm); }
  .metric-card .lab { font-size: 12px; color: var(--mut); }
  .metric-card .big { font-family: var(--sans); font-size: 24px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .metric-card .sub { font-size: 11px; color: var(--mut); margin-top: 4px; }

  /* ============ v8 Reveal 滚动入场 ============ */
  .reveal { opacity: 1; }
  .is-new .reveal { opacity: 0; transition: opacity var(--rv-dur) var(--ease-out), transform var(--rv-dur) var(--ease-out); transition-delay: var(--rv-delay, 0ms); will-change: opacity, transform; }
  .is-new .reveal-up { transform: translateY(22px); }
  .is-new .reveal.in-view { opacity: 1; transform: none; }
  .is-old .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }

  @media (prefers-reduced-motion: reduce) {
    .hero-aurora, .btn-shine::after { animation: none !important; transition: none !important; }
    .is-new .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
  }

  @media (max-width: 860px) {
    .sidebar { display: none; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .metric-grid { grid-template-columns: 1fr; }
  }

  .legend { padding: 10px 26px 30px; font-size: 11.5px; color: #9b8e85; max-width: 1080px; }
</style>
</head>
<body>
  <div class="topbar-ctrl">
    <div class="brand"><span class="dot"></span>知岸 · 视觉升级对比</div>
    <div class="seg" id="segMode">
      <button data-mode="slider" class="on">拖动竖条对比</button>
      <button data-mode="toggle">半透明按钮切换</button>
    </div>
    <div class="toggle-pills" id="togglePills">
      <button class="pill active" data-show="new">显示新版</button>
      <button class="pill" data-show="old">显示旧版</button>
    </div>
    <div class="spacer"></div>
    <div class="hint" id="hint">拖动中间竖条，左侧=新版 · 右侧=旧版</div>
  </div>

  <div class="corner-badge left">新版 · v2 (hero-aurora / 数字递增 / 按钮扫光 / 滚动入场)</div>
  <div class="corner-badge right">旧版 · v1 (静态扁平)</div>

  <div class="compare-stage" id="stage">
    <div class="layer layer-old is-old" id="layerOld"></div>
    <div class="layer layer-new is-new" id="layerNew"></div>
    <div class="divider" id="divider" tabindex="0" role="slider" aria-label="新旧对比拖动条" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50">
      <div class="grip">◄►</div>
    </div>
  </div>

  <div class="legend">
    说明：本页为「高保真静态还原」——用生产里真实的 v8 设计令牌与动效 CSS（<code>hero-aurora</code> / <code>btn-shine</code> / <code>count-up</code> / <code>reveal</code>）渲染同一套 Dashboard 布局两次，左右对齐像素级一致，仅视觉处理不同。运行中的真实应用（<code>localhost:4173</code>）即新版效果（需登录后查看）。
  </div>

<script>
  // ============ Dashboard 模板（新旧共用，保证布局一致） ============
  const DASHBOARD = `
  <div class="app-shell">

              <span class="kicker">企业知识中枢</span>

              <div class="hero-cta-row">

  const layerOld = document.getElementById('layerOld');
  const layerNew = document.getElementById('layerNew');
  layerOld.innerHTML = DASHBOARD;
  layerNew.innerHTML = DASHBOARD;

  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ============ 数字递增 ============
  function setStatic(el){ el.textContent = Number(el.dataset.count).toLocaleString('zh-CN'); }
  function animateCount(el){
    const target = Number(el.dataset.count);
    const dur = 1100; const start = performance.now();
    const ease = t => 1 - Math.pow(1 - t, 3);
    (function tick(now){
      const p = Math.min(1, (now - start) / dur);
      el.textContent = Math.round(target * ease(p)).toLocaleString('zh-CN');
      if (p < 1) requestAnimationFrame(tick);
    })(performance.now());
  }
  // 旧版：直接显示终值；新版：递增
  layerOld.querySelectorAll('[data-count]').forEach(setStatic);
  if (reduce) { layerNew.querySelectorAll('[data-count]').forEach(setStatic); }
  else { layerNew.querySelectorAll('[data-count]').forEach(animateCount); }

  // ============ Reveal 入场（新版错峰） ============
  if (!reduce) {
    layerNew.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('in-view'), 120 + i * 120);
    });
  } else {
    layerNew.querySelectorAll('.reveal').forEach(el => el.classList.add('in-view'));
  }

  // ============ 竖条拖动 ============
  const stage = document.getElementById('stage');
  const divider = document.getElementById('divider');
  const root = document.documentElement;
  let dragging = false;

  function setPos(pct){
    pct = Math.max(0, Math.min(100, pct));
    root.style.setProperty('--pos', pct + '%');
    divider.setAttribute('aria-valuenow', Math.round(pct));
  }
  function posFromEvent(clientX){
    const r = stage.getBoundingClientRect();
    return ((clientX - r.left) / r.width) * 100;
  }
  divider.addEventListener('pointerdown', e => {
    if (document.body.classList.contains('mode-toggle')) return;
    dragging = true; document.body.classList.add('dragging');
    divider.setPointerCapture(e.pointerId); e.preventDefault();
  });
  divider.addEventListener('pointermove', e => { if (dragging) setPos(posFromEvent(e.clientX)); });
  divider.addEventListener('pointerup', e => { dragging = false; document.body.classList.remove('dragging'); });
  divider.addEventListener('pointercancel', () => { dragging = false; document.body.classList.remove('dragging'); });
  divider.addEventListener('keydown', e => {
    const cur = parseFloat(getComputedStyle(root).getPropertyValue('--pos')) || 50;
    if (e.key === 'ArrowLeft') { setPos(cur - 3); e.preventDefault(); }
    if (e.key === 'ArrowRight') { setPos(cur + 3); e.preventDefault(); }
  });
  // 点击舞台空白处也可跳转（仅 slider 模式）
  stage.addEventListener('pointerdown', e => {
    if (document.body.classList.contains('mode-toggle')) return;
    if (e.target === divider || divider.contains(e.target)) return;
    setPos(posFromEvent(e.clientX));
  });

  // ============ 模式切换 ============
  const seg = document.getElementById('segMode');
  const pills = document.getElementById('togglePills');
  const hint = document.getElementById('hint');
  seg.addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    const mode = btn.dataset.mode;
    [...seg.children].forEach(b => b.classList.toggle('on', b === btn));
    if (mode === 'slider') {
      document.body.classList.remove('mode-toggle');
      pills.classList.remove('show');
      hint.textContent = '拖动中间竖条，左侧=新版 · 右侧=旧版';
    } else {
      document.body.classList.add('mode-toggle');
      pills.classList.add('show');
      hint.textContent = '用右上角半透明按钮切换查看新版 / 旧版';
    }
  });
  pills.addEventListener('click', e => {
    const btn = e.target.closest('button'); if (!btn) return;
    const show = btn.dataset.show;
    [...pills.children].forEach(b => b.classList.toggle('active', b === btn));
    // 显示新版 -> clip 全部保留(0)；显示旧版 -> clip 全部裁掉(100)
    setPos(show === 'new' ? 0 : 100);
  });
</script>
